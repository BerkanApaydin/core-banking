spring:
  cache:
    type: none
  datasource:
    url: jdbc:h2:mem:bank_db_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

jwt:
  allow-default-secret: true

app:
  security:
    cors:
      allowed-origins: http://localhost:3000

