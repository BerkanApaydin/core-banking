jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5971

resilience4j:
  circuitbreaker:
    instances:
      emailNotification:
        registerHealthIndicator: true
        slidingWindowSize: 3
        permittedNumberOfCallsInHalfOpenState: 1
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 2
        waitDurationInOpenState: 60000
        failureRateThreshold: 50
      smsNotification:
        registerHealthIndicator: true
        slidingWindowSize: 3
        permittedNumberOfCallsInHalfOpenState: 1
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 2
        waitDurationInOpenState: 60000
        failureRateThreshold: 50

app:
  security:
    cors:
      allowed-origins: http://localhost:3000
    rate-limit:
      max-requests: 100
      time-window-ms: 60000
  idempotency:
    expiration-hours: 24
    cleanup-cron: 0 0 0 * * ?
  transfer:
    cancellation-window-hours: 24

spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
