jwt:
  allow-default-secret: false
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoint:
    health:
      show-details: when_authorized

app:
  security:
    rate-limit:
      backend: redis
