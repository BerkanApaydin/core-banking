server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 50 DB bağlantısı üzerinde daha fazlası beklemeye giriyor; ölçüm: 25 thread = 74ms
      min-spare: 10
    accept-count: 500
    max-connections: 2000

spring:
  messages:
    basename: messages
    encoding: UTF-8
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/bank_db
    username: bank_user
    password: bank_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50 # PostgreSQL optimumu; üstesi context-switch ve lock contention üretiyor
      minimum-idle: 10
      connection-timeout: 5000 # 5sn: bağlanamayan istek hızlı hata versin, kuyrukta beklesin
      idle-timeout: 300000 # 5 dk
      max-lifetime: 1200000 # 20 dk
      keepalive-time: 60000 # Bağlantı canlı tutma – idle connection drop'u önler
      leak-detection-threshold: 10000 # 10sn aşan bağlantıları logla
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    baseline-on-migrate: true
    validate-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}
  allow-default-secret: true

app:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080}
    rate-limit:
      backend: ${RATE_LIMIT_BACKEND:caffeine}
      max-requests: ${RATE_LIMIT_MAX_REQUESTS:10}
      time-window-ms: ${RATE_LIMIT_TIME_WINDOW_MS:10000}
      paths:
        - /api/v1/auth/login
        - /api/v1/auth/register
        - /api/v1/accounts
        - /api/v1/transfers
  idempotency:
    cleanup-cron: ${IDEMPOTENCY_CLEANUP_CRON:0 0 * * * *}
    expiration-hours: ${IDEMPOTENCY_EXPIRATION_HOURS:24}
  transfer:
    cancellation-window-hours: ${TRANSFER_CANCELLATION_WINDOW_HOURS:24}
  outbox:
    poll-delay-ms: ${OUTBOX_POLL_DELAY_MS:2000}
    max-retries: ${OUTBOX_MAX_RETRIES:5}
    use-skip-locked: ${OUTBOX_USE_SKIP_LOCKED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

resilience4j:
  circuitbreaker:
    instances:
      emailNotification:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5000
        failureRateThreshold: 50
      smsNotification:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5000
        failureRateThreshold: 50
