server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 500
    max-connections: 2000
    max-swallow-size: 2MB
    max-http-form-post-size: 2MB
  compression:
    enabled: true
    mime-types: application/json,application/problem+json,text/html,text/css,application/javascript
    min-response-size: 1024

spring:
  application:
    name: clean-architecture-bank
  messages:
    basename: messages
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/bank_db
    username: ${DB_USERNAME:bank_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50 # PostgreSQL optimumu; üstesi context-switch ve lock contention üretiyor
      minimum-idle: 10
      connection-timeout: 5000 # 5sn: bağlanamayan istek hızlı hata versin, kuyrukta beklesin
      idle-timeout: 300000 # 5 dk
      max-lifetime: 1200000 # 20 dk
      keepalive-time: 60000 # Bağlantı canlı tutma – idle connection drop'u önler
      leak-detection-threshold: 10000 # 10sn aşan bağlantıları logla
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    baseline-on-migrate: true
    validate-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  allow-default-secret: ${JWT_ALLOW_DEFAULT_SECRET:false}

app:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080}
    failed-login:
      backend: ${FAILED_LOGIN_BACKEND:caffeine}
      max-attempts: ${FAILED_LOGIN_MAX_ATTEMPTS:5}
      window-minutes: ${FAILED_LOGIN_WINDOW_MINUTES:15}
    rate-limit:
      backend: ${RATE_LIMIT_BACKEND:caffeine}
      max-requests: ${RATE_LIMIT_MAX_REQUESTS:10}
      time-window-ms: ${RATE_LIMIT_TIME_WINDOW_MS:10000}
      paths:
        - /api/v1/auth/login
        - /api/v1/auth/register
        - /api/v1/accounts
        - /api/v1/transfers
  idempotency:
    cleanup-cron: ${IDEMPOTENCY_CLEANUP_CRON:0 0 * * * *}
    expiration-hours: ${IDEMPOTENCY_EXPIRATION_HOURS:24}
  transfer:
    cancellation-window-hours: ${TRANSFER_CANCELLATION_WINDOW_HOURS:24}
  outbox:
    poll-delay-ms: ${OUTBOX_POLL_DELAY_MS:2000}
    max-retries: ${OUTBOX_MAX_RETRIES:5}
    use-skip-locked: ${OUTBOX_USE_SKIP_LOCKED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized


