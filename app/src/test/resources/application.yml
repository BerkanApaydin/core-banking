spring:
  cache:
    type: none
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

jwt:
  allow-default-secret: true

app:
  security:
    cors:
      allowed-origins: http://localhost:3000
    rate-limit:
      backend: caffeine
      max-requests: 1000
      time-window-ms: 1000
  idempotency:
    cleanup-cron: "0 0 * * * *"
    expiration-hours: 24
  transfer:
    cancellation-window-hours: 24
  outbox:
    use-skip-locked: false
    max-retries: 5

