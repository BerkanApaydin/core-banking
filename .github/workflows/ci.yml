name: Java CI/CD with Maven

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bank_db
          POSTGRES_USER: bank_user
          POSTGRES_PASSWORD: bank_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build and Compile
      run: mvn compile -q
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: bank_user
        DB_PASSWORD: bank_password

    - name: Unit & Integration Tests (with coverage)
      run: mvn install jacoco:report -T 4 -q
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: bank_user
        DB_PASSWORD: bank_password
        JWT_SECRET: ${{ secrets.JWT_SECRET || '404E635266556A586E3272357538782F413F4428472B4B6250645367566B5971' }}

    - name: Architecture Tests
      run: mvn test -pl app -am -Dtest="ArchitectureTest" -Dsurefire.failIfNoSpecifiedTests=false -q

    - name: Cache PIT History
      uses: actions/cache@v4
      with:
        path: '**/target/pit-history.txt'
        key: ${{ runner.os }}-pit-${{ hashFiles('**/*.java') }}
        restore-keys: ${{ runner.os }}-pit-

    - name: Mutation Tests (PIT)
      run: mvn pitest:mutationCoverage -Dpitest.skip=false -T 4 -q
      continue-on-error: true
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: bank_user
        DB_PASSWORD: bank_password

    - name: Upload JaCoCo Coverage Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-reports
        path: '**/target/site/jacoco/'

    - name: Upload PIT Mutation Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pit-reports
        path: '**/target/pit-reports/'

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/target/surefire-reports/'

    - name: Upload Failsafe Integration Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: failsafe-reports
        path: '**/target/failsafe-reports/'
